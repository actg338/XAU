    fetch('https://api.github.com/repos/actg338/XAU/releases/tags/'+releaseTag,{headers:{Accept:'application/vnd.github+json'}})
      .then(r=>{if(!r.ok)throw new Error('release unavailable');return r.json()})
      .then(data=>{const counts={};data.assets.forEach(a=>counts[a.name]=a.download_count);render(counts)})
      .catch(()=>document.querySelectorAll('[data-count]').forEach(el=>el.textContent='統計釋出後顯示'));
    document.addEventListener('click',function(event){
      const button=event.target.closest('.guide');
      document.querySelectorAll('.guide-wrap.open').forEach(function(wrap){
        if(!button||wrap!==button.closest('.guide-wrap')){wrap.classList.remove('open');wrap.querySelector('.guide').setAttribute('aria-expanded','false')}
      });
      if(button){const wrap=button.closest('.guide-wrap');const open=wrap.classList.toggle('open');button.setAttribute('aria-expanded',String(open))}
    });
  </script>
</body>
</html>
