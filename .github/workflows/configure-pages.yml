name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/configure-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Request Pages build from main
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
