name: Update News Data

on:
  schedule:
    # GitHub Actions 最短为 5 分钟；错开整点高峰以降低排队和漏跑概率。
    - cron: '2-57/5 * * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update.yml'

permissions:
  contents: write

concurrency:
  group: update-news-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure data directory
        run: mkdir -p data

      - name: Install Python dependencies
        run: python -m pip install 'requests==2.32.4' 'beautifulsoup4==4.13.4'

      - name: Fetch XAUUSD price
        run: python scripts/fetch_xauusd.py

      - name: Fetch DXY
        run: python scripts/fetch_dxy.py

      - name: Fetch Warsh stance
        run: python scripts/fetch_warsh.py

      - name: Fetch FedWatch
        run: python scripts/fetch_fedwatch.py

      - name: Fetch authoritative news
        run: python scripts/fetch_news.py

      - name: Pre-translate dynamic content
        run: python scripts/pretranslate.py

      - name: Generate aggregated signal
        run: python scripts/build_signal.py

      - name: Validate JSON files
        run: |
          set -euo pipefail
          for f in data/*.json; do
            python -m json.tool "$f" >/dev/null
            echo "OK: $f"
          done
          python scripts/validate_data.py

      - name: Commit and push
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: auto-update news center $(date -u +'%Y-%m-%d %H:%M UTC')"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep $((attempt * 2))
            done
          fi
